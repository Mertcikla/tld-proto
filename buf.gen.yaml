version: v2
plugins:
  # Go — protobuf messages
  - local: [go, tool, protoc-gen-go]
    out: grpc/gen
    opt: paths=source_relative
  # Go — ConnectRPC service clients/servers
  - local: [go, tool, protoc-gen-connect-go]
    out: grpc/gen
    opt:
      - paths=source_relative
  # TypeScript — ES module bindings for the frontend
  - remote: buf.build/bufbuild/es:v2.11.0
    out: ../frontend-wrapper/src/gen
    opt:
      - target=ts
