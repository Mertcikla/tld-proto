syntax = "proto3";

package diag.v1;

import "google/protobuf/timestamp.proto";
import "diag/v1/workspace_service.proto";

option go_package = "buf.build/gen/go/tldiagramcom/diagram/protocolbuffers/go/diag/v1;diagv1";

// ExploreService provides the infinite-zoom workspace view surface and sharing.
// All RPCs require authentication.
service ExploreService {
  // GetExploreIndex returns sparse view metadata, counts, bounds, and tree links.
  rpc GetExploreIndex(GetExploreIndexRequest) returns (GetExploreIndexResponse);

  // GetExploreContent returns placements/connectors for a caller-selected batch
  // of views. This is the lazy counterpart to GetWorkspace(include_content=true).
  rpc GetExploreContent(GetExploreContentRequest) returns (GetExploreContentResponse);

  // SearchExploreTargets searches views and placed elements without requiring the
  // browser to hold full workspace content.
  rpc SearchExploreTargets(SearchExploreTargetsRequest) returns (SearchExploreTargetsResponse);

  // ResolveExploreFocus returns a breadcrumb/focus path and the minimal corridor
  // views needed to animate toward a deep target.
  rpc ResolveExploreFocus(ResolveExploreFocusRequest) returns (ResolveExploreFocusResponse);

  // GetCrossBranchCounts returns exact counts-only aggregate edges for the
  // requested visible anchors. Underlying path details stay server-side.
  rpc GetCrossBranchCounts(GetCrossBranchCountsRequest) returns (GetCrossBranchCountsResponse);

  // ShareView creates a shareable token for a view.
  rpc ShareView(ShareViewRequest) returns (ShareViewResponse);
}

// ── Lazy Explore ─────────────────────────────────────────────────────────

message ExploreBounds {
  double min_x = 1;
  double min_y = 2;
  double max_x = 3;
  double max_y = 4;
}

message ExploreViewIndexEntry {
  int32 view_id = 1;
  string name = 2;
  optional string description = 3;
  optional string level_label = 4;
  int32 level = 5;
  int32 depth = 6;
  optional int32 owner_element_id = 7;
  optional int32 parent_view_id = 8;
  int32 child_count = 9;
  int32 element_count = 10;
  int32 connector_count = 11;
  ExploreBounds bounds = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message GetExploreIndexRequest {
  // Optional. For shared/public wrappers this scopes index entries to the share root.
  optional int32 root_view_id = 1;
}

message GetExploreIndexResponse {
  repeated ExploreViewIndexEntry views = 1;
  repeated ElementNavigationInfo navigations = 2;
}

message GetExploreContentRequest {
  repeated int32 view_ids = 1;
}

message GetExploreContentResponse {
  map<int32, ViewContent> content = 1;
}

message SearchExploreTargetsRequest {
  string query = 1;
  int32 limit = 2;
  optional int32 root_view_id = 3;
}

message ExploreFocusStep {
  int32 view_id = 1;
  optional int32 owner_element_id = 2;
  int32 depth = 3;
  string name = 4;
}

message ExploreSearchResult {
  string result_type = 1; // "view" or "element"
  int32 view_id = 2;
  optional int32 element_id = 3;
  string name = 4;
  string view_name = 5;
  optional string kind = 6;
  repeated ExploreFocusStep focus_path = 7;
}

message SearchExploreTargetsResponse {
  repeated ExploreSearchResult results = 1;
}

message ResolveExploreFocusRequest {
  int32 current_view_id = 1;
  int32 target_view_id = 2;
  optional int32 target_element_id = 3;
  int32 max_waypoint_delta = 4;
  optional int32 root_view_id = 5;
}

message ResolveExploreFocusResponse {
  repeated ExploreFocusStep focus_path = 1;
  int32 waypoint_view_id = 2;
  repeated int32 corridor_view_ids = 3;
}

message CrossBranchAnchor {
  int32 element_id = 1;
  string node_id = 2;
  string label = 3;
}

message GetCrossBranchCountsRequest {
  int32 focus_view_id = 1;
  repeated CrossBranchAnchor anchors = 2;
  int32 shallow_levels = 3;
  int32 deep_levels = 4;
  int32 limit = 5;
  optional int32 root_view_id = 6;
}

message CrossBranchCountEdge {
  string key = 1;
  int32 source_anchor_element_id = 2;
  int32 target_anchor_element_id = 3;
  string source_anchor_name = 4;
  string target_anchor_name = 5;
  int32 count = 6;
  repeated int32 owner_view_ids = 7;
  repeated string owner_view_names = 8;
}

message GetCrossBranchCountsResponse {
  repeated CrossBranchCountEdge edges = 1;
  int32 omitted_count = 2;
}

// ── Share View ───────────────────────────────────────────────────────────

message ShareViewRequest {
  int32 view_id = 1;
  optional string password = 2;
  optional google.protobuf.Timestamp expires_at = 3;
}
message ShareViewResponse {
  string token = 1;
  string url = 2;
}
