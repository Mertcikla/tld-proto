syntax = "proto3";

package diag.v1;

import "google/protobuf/timestamp.proto";

option go_package = "buf.build/gen/go/tldiagramcom/diagram/protocolbuffers/go/diag/v1;diagv1";

// OrgService manages the current organization: settings, members,
// invitations, and API keys. All RPCs require authentication.
service OrgService {
  rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse);
  rpc UpdateOrganization(UpdateOrganizationRequest) returns (UpdateOrganizationResponse);
  rpc GetUsage(GetUsageRequest) returns (GetUsageResponse);
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (UpdateMemberRoleResponse);
  rpc RemoveMember(RemoveMemberRequest) returns (RemoveMemberResponse);
  rpc CreateInvitation(CreateInvitationRequest) returns (CreateInvitationResponse);
  rpc ListInvitations(ListInvitationsRequest) returns (ListInvitationsResponse);
  rpc DeleteInvitation(DeleteInvitationRequest) returns (DeleteInvitationResponse);
  rpc ResendInvitation(ResendInvitationRequest) returns (ResendInvitationResponse);
  rpc ListAPIKeys(ListAPIKeysRequest) returns (ListAPIKeysResponse);
  rpc CreateAPIKey(CreateAPIKeyRequest) returns (CreateAPIKeyResponse);
  rpc RevokeAPIKey(RevokeAPIKeyRequest) returns (RevokeAPIKeyResponse);

  // Tags
  rpc ListTagColors(ListTagColorsRequest) returns (ListTagColorsResponse);
  rpc UpdateTag(UpdateTagRequest) returns (UpdateTagResponse);

  rpc SeedOrganization(SeedOrganizationRequest) returns (SeedOrganizationResponse);
}

message SeedOrganizationRequest {}
message SeedOrganizationResponse {}

// ── Organization ─────────────────────────────────────────────────────────

message Organization {
  string id = 1;
  string name = 2;
  string slug = 3;
  string plan = 4;
  optional google.protobuf.Timestamp trial_started_at = 5;
  optional google.protobuf.Timestamp trial_ends_at = 6;
  bool trial_used = 7;
}

message GetOrganizationRequest {}
message GetOrganizationResponse {
  Organization organization = 1;
}

message UpdateOrganizationRequest {
  string name = 1;
}
message UpdateOrganizationResponse {
  Organization organization = 1;
}

// ── Usage ────────────────────────────────────────────────────────────────

message UsageCounter {
  optional int32 used = 1;
  optional int32 limit = 2;
}

message GetUsageRequest {}
message GetUsageResponse {
  UsageCounter diagrams = 1;
  UsageCounter objects = 2;
  UsageCounter members = 3;
  UsageCounter editors = 4;
  bool is_read_only = 5;
  string effective_plan = 6;
}

// ── Members ──────────────────────────────────────────────────────────────

message OrgMember {
  string id = 1;
  string org_id = 2;
  string user_id = 3;
  string role = 4;
  google.protobuf.Timestamp joined_at = 5;
  string username = 6;
  optional string email = 7;
}

message ListMembersRequest {}
message ListMembersResponse {
  repeated OrgMember members = 1;
}

message UpdateMemberRoleRequest {
  string user_id = 1;
  string role = 2;
}
message UpdateMemberRoleResponse {}

message RemoveMemberRequest {
  string user_id = 1;
}
message RemoveMemberResponse {}

// ── Invitations ──────────────────────────────────────────────────────────

message Invitation {
  string id = 1;
  string org_id = 2;
  string invited_by = 3;
  string email = 4;
  string role = 5;
  string token = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp expires_at = 9;
}

message CreateInvitationRequest {
  string email = 1;
  string username = 2;
  string role = 3;
}
message CreateInvitationResponse {
  // If user existed and was added directly, member is set.
  optional OrgMember member = 1;
  // If invitation was created, invitation is set.
  optional Invitation invitation = 2;
  string message = 3;
}

message ListInvitationsRequest {}
message ListInvitationsResponse {
  repeated Invitation invitations = 1;
}

message DeleteInvitationRequest {
  string id = 1;
}
message DeleteInvitationResponse {}

message ResendInvitationRequest {
  string id = 1;
}
message ResendInvitationResponse {}

// ── API Keys ─────────────────────────────────────────────────────────────

message APIKey {
  string id = 1;
  string user_id = 2;
  string org_id = 3;
  string name = 4;
  string key_prefix = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp last_used_at = 7;
}

message CreatedAPIKey {
  string id = 1;
  string user_id = 2;
  string org_id = 3;
  string name = 4;
  string key_prefix = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp last_used_at = 7;
  // plaintext key - shown once, never stored.
  string key = 8;
}

message ListAPIKeysRequest {}
message ListAPIKeysResponse {
  repeated APIKey api_keys = 1;
}

message CreateAPIKeyRequest {
  string name = 1;
}
message CreateAPIKeyResponse {
  CreatedAPIKey api_key = 1;
}

message RevokeAPIKeyRequest {
  string id = 1;
}
message RevokeAPIKeyResponse {}

message Tag {
  string color = 1;
  optional string description = 2;
}

message ListTagColorsRequest {}
message ListTagColorsResponse {
  // Map of tag name to tag info
  map<string, Tag> tags = 1;
}

message UpdateTagRequest {
  string tag = 1;
  string color = 2;
  optional string description = 3;
}
message UpdateTagResponse {}
